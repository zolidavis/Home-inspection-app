name: Deploy API to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# Cancel in-flight runs for the same ref so only the latest deploy lands.
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

# Silence Node 22's punycode DEP0040 warning bubbling up from
# transitive deps. Pure noise reduction.
env:
  NODE_OPTIONS: --no-deprecation

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version picked up from root package.json "packageManager" field

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install monorepo dependencies
        # --dangerously-allow-all-builds: pnpm 11 fails the install when build
        # scripts (e.g. esbuild postinstall) are ignored. Safe for CI since
        # the lockfile is the source of truth.
        run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds

      - name: Typecheck API
        run: pnpm --filter @inspect-ai/api typecheck

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine deploy target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "env=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          else
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle Edge function with esbuild
        run: pnpm --filter @inspect-ai/api build:vercel

      - name: Link Vercel project
        working-directory: apps/api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Idempotent: succeeds whether or not the project is already linked.
          vercel pull \
            --yes \
            --environment=${{ steps.target.outputs.env }} \
            --token="$VERCEL_TOKEN" \
          || vercel link --yes --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel
        id: deploy
        working-directory: apps/api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 API preview deployed: ${{ steps.deploy.outputs.url }}`
            })
